<main>
<section class="panel" id="contact">
  <div class="hero short">
    <div class="hero-media"><img class="hero-img" src="../assets/images/may-17-2016-21-41-57.gif" alt=""><div class="hero-overlay"></div></div>
    <div class="hero-text"><h1 class="hero-title">Contact</h1></div>
  </div>
  <div class="content">
    <div class="content-inner narrow">
      <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
        <input type="hidden" name="access_key" value="6134d78c-e432-4ef6-9a31-ab7b158cc319">
        <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off" aria-hidden="true">
        <div class="field-row">
          <label>Name <span class="req">*</span>
            <div class="two-up">
              <input type="text" name="first-name" autocomplete="given-name" aria-label="First Name" placeholder="First Name" required>
              <input type="text" name="last-name" autocomplete="family-name" aria-label="Last Name" placeholder="Last Name" required>
            </div>
          </label>
        </div>
        <div class="field-row">
          <label>Email Address <span class="req">*</span>
            <input type="email" name="email" autocomplete="email" required>
          </label>
        </div>
        <div class="field-row">
          <label>Phone
            <input type="tel" name="phone" autocomplete="tel">
          </label>
        </div>
        <div class="field-row">
          <label>Subject <span class="req">*</span>
            <input type="text" name="subject" required>
          </label>
        </div>
        <div class="field-row">
          <label>Message <span class="req">*</span>
            <textarea name="message" rows="6" required></textarea>
          </label>
        </div>
        <button type="submit" class="btn submit">Submit</button>
      </form>
    </div>
  </div>
</section>
